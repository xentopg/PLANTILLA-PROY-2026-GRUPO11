<!DOCTYPE html>
<html lang="es">
<head>
    <title>Xentlock Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding-top: 50px; }
        .tarjeta { background-color: white; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); width: 90%; max-width: 750px; box-sizing: border-box; }
        .btn { display: inline-block; width: 44%; padding: 22px; margin: 10px 2%; font-size: 1.1em; font-weight: bold; color: white; border: none; border-radius: 50px; cursor: pointer; }
        h1 { color: #2c3e50; }
        .tarjeta-usuario { background-color: #f8f9fa; border-left: 5px solid #3498db; padding: 15px; margin-top: 12px; border-radius: 8px; text-align: left; position: relative; min-height: 70px; }
        .entrada-registro { background-color: #f8f9fa; border-left: 5px solid #2ecc71; padding: 10px 15px; margin-top: 8px; border-radius: 8px; text-align: left; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="tarjeta">
        <h1>Xentlock</h1>
        <p>Estado del sistema:</p>
        <h2 id="txt-estado">Cargando...</h2>
        <hr>
        <button class="btn" style="background-color:#2ecc71;" onclick="enviarComando('abrir')">🔓 ABRIR CANDADO</button>
        <button class="btn" style="background-color:#e74c3c;" onclick="enviarComando('cerrar')">🔒 CERRAR CANDADO</button>

        <div style="margin-top:40px; border-top:2px solid #ecf0f1; padding-top:25px;">
            <h3 style="color:#34495e; text-align:left;">Usuarios Registrados</h3>
            <div id="lista-usuarios"></div>
        </div>

        <div style="margin-top:30px; border-top:2px solid #ecf0f1; padding-top:20px;">
            <h3 style="color:#34495e; text-align:left;">Registrar Nuevo Usuario</h3>
            <input type="text" id="input-nombre" placeholder="Ej: Lionel Messi"
                style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; box-sizing:border-box;">
            <button onclick="registrarUsuario()"
                style="width:100%; background-color:#1e88e5; color:white; padding:16px; border:none; border-radius:50px; font-size:1em; font-weight:bold; margin-top:15px; cursor:pointer;">
                ➕ GUARDAR EN XENTLOCK
            </button>
        </div>

        <div style="margin-top:30px; border-top:2px solid #ecf0f1; padding-top:20px;">
            <h3 style="color:#34495e; text-align:left;">📋 Registro de Aperturas</h3>
            <div id="lista-registro"></div>
        </div>
    </div>

    <script>
        const socket = io();
        socket.on('estado_update', function(data) {
            document.getElementById('txt-estado').innerText = data.estado;
        });
        socket.on('registro_update', function(data) {
            mostrarRegistro(data.registro);
        });

       function mostrarRegistro(registro) {
    const lista = document.getElementById('lista-registro');
    if (registro.length === 0) {
        lista.innerHTML = '<p style="color:#7f8c8d;">Sin registros aún.</p>';
        return;
    }
    lista.innerHTML = '';
    registro.forEach(r => {
        const color = r.tipo.includes('denegado') ? '#e74c3c' : '#2ecc71';
        lista.innerHTML += `
            <div class="entrada-registro" style="border-left-color:${color}">
                ${r.tipo} &nbsp;|&nbsp; 🕐 <strong>${r.hora}</strong> — ${r.metodo}
            </div>`;
    });
}

        function cargarEstado() {
            fetch('/api/estado')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('txt-estado').innerText = data.estado;
                    const lista = document.getElementById('lista-usuarios');
                    lista.innerHTML = '';
                    data.usuarios.forEach(u => {
                        lista.innerHTML += `
                            <div class="tarjeta-usuario">
                                <button onclick="eliminarUsuario('${u.nombre}')"
                                    style="position:absolute; right:15px; top:50%; transform:translateY(-50%);
                                    background-color:#e74c3c; color:white; border:none; padding:8px 12px;
                                    border-radius:6px; cursor:pointer; font-weight:bold;">❌</button>
                                <div style="padding-right:60px;">
                                    <strong>👤 ${u.nombre}</strong>
                                    <div style="font-size:0.85em; color:#7f8c8d; margin-top:4px;">
                                        ${u.metodo}<br>
                                        <small style="font-family:monospace; color:#e67e22;">${u.id_sensor}</small>
                                    </div>
                                </div>
                            </div>`;
                    });
                });
        }

        function cargarRegistro() {
            fetch('/api/registro')
                .then(r => r.json())
                .then(data => mostrarRegistro(data.registro));
        }

        function enviarComando(accion) {
            fetch('/api/' + accion, {method: 'POST'})
                .then(r => r.json())
                .then(data => {
                    document.getElementById('txt-estado').innerText = data.nuevo_estado;
                });
        }

        function registrarUsuario() {
            const nombre = document.getElementById('input-nombre').value.trim();
            if (!nombre) { alert('Escribe un nombre antes de guardar.'); return; }
            fetch('/api/agregar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({nombre: nombre})
            }).then(() => cargarEstado());
        }

        function eliminarUsuario(nombre) {
            if (!confirm('¿Eliminar a ' + nombre + '?')) return;
            fetch('/api/eliminar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({nombre: nombre})
            }).then(() => cargarEstado());
        }

        cargarEstado();
        cargarRegistro();
        setInterval(cargarEstado, 3000);
    </script>
</body>
</html>
